name: Build LocalReactivePolice ASI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    env:
      PLUGIN_SDK_DIR: C:\plugin-sdk

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Clonar plugin-sdk
      run: |
        git clone https://github.com/DK22Pac/plugin-sdk.git C:\plugin-sdk

    - name: Patch injector.hpp
      run: |
        $f = "C:\plugin-sdk\injector\injector.hpp"
        $c = Get-Content $f -Raw
        # Substituir o template problemático por versão compatível
        $c = $c -replace '(?s)(template\s*<[^>]*>)\s*\n(\s*)(inline\s+\w+\s+\w+\s*\([^)]*valid_pointer_type[^)]*\))', '$1`n$2// patched`n$2'
        # Desativar include do injector nas partes problemáticas  
        $c = $c -replace '#include\s+"injector/injector\.hpp"', '// injector disabled'
        Set-Content $f $c

    - name: Patch plugin.h para desativar injector
      run: |
        $f = "C:\plugin-sdk\plugin_sa\plugin.h"
        $c = Get-Content $f -Raw
        $c = $c -replace '#include\s+"injector/injector\.hpp"', '// injector disabled'
        $c = $c -replace '#include\s+"injector\\\\injector\.hpp"', '// injector disabled'
        Set-Content $f $c

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compilar plugin
      working-directory: ${{ github.workspace }}
      run: |
        msbuild LocalReactivePolice.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PLUGIN_SDK_DIR="C:\plugin-sdk"

    - name: Upload ASI
      uses: actions/upload-artifact@v4
      with:
        name: LocalReactivePolice
        path: ${{ github.workspace }}\bin\Release\LocalReactivePolice.asi
