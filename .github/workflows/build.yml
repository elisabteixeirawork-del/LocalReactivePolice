name: Build LocalReactivePolice ASI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Clonar plugin-sdk
      run: |
        git clone https://github.com/DK22Pac/plugin-sdk.git C:\plugin-sdk

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compilar plugin
      working-directory: ${{ github.workspace }}
      run: |
        msbuild LocalReactivePolice.vcxproj `
          /p:Configuration=Release `
          /p:Platform=Win32 `
          /p:PLUGIN_SDK_DIR="C:\plugin-sdk" `
          /p:AdditionalIncludeDirectories="C:\plugin-sdk\plugin_sa;C:\plugin-sdk\plugin_sa\game_sa;C:\plugin-sdk\shared;C:\plugin-sdk\shared\game"

    - name: Upload ASI
      uses: actions/upload-artifact@v4
      with:
        name: LocalReactivePolice
        path: ${{ github.workspace }}\bin\Release\LocalReactivePolice.asi
