name: Build LocalReactivePolice ASI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    env:
      PLUGIN_SDK_DIR: C:\plugin-sdk

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Clonar plugin-sdk
      run: |
        git clone https://github.com/DK22Pac/plugin-sdk.git C:\plugin-sdk

    - name: Substituir injector.hpp por versão corrigida
      run: |
        $content = "#pragma once`nnamespace injector {}"
        Set-Content "C:\plugin-sdk\injector\injector.hpp" $content

    - name: Substituir safetyhook.hpp por versão corrigida
      run: |
        $content = "#pragma once`n// safetyhook disabled for compatibility"
        Set-Content "C:\plugin-sdk\safetyhook\safetyhook.hpp" $content

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compilar plugin
      working-directory: ${{ github.workspace }}
      run: |
        msbuild LocalReactivePolice.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PLUGIN_SDK_DIR="C:\plugin-sdk"

    - name: Upload ASI
      uses: actions/upload-artifact@v4
      with:
        name: LocalReactivePolice
        path: ${{ github.workspace }}\bin\Release\LocalReactivePolice.asi
