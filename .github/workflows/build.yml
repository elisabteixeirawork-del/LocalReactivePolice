name: Build LocalReactivePolice ASI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compilar plugin
      working-directory: ${{ github.workspace }}
      run: |
        msbuild LocalReactivePolice_v3.vcxproj /p:Configuration=Release /p:Platform=Win32

    - name: Upload ASI
      uses: actions/upload-artifact@v4
      with:
        name: LocalReactivePolice
        path: ${{ github.workspace }}\bin\Release\LocalReactivePolice.asi
